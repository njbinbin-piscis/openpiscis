name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Frontend: lint → type-check → test
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Frontend unit tests
        run: npm test

  # ──────────────────────────────────────────────────────────────────────────
  # Rust kernel / CLI: OS/UI-neutral crates build on any platform
  # ──────────────────────────────────────────────────────────────────────────
  rust-kernel:
    name: Rust kernel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-tauri
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust format check (kernel crates)
        run: cargo fmt -p pisci-core -p pisci-kernel -p pisci-cli --check

      - name: Clippy (kernel crates)
        run: cargo clippy -p pisci-core -p pisci-kernel -p pisci-cli --all-targets -- -D warnings

      - name: Unit tests (kernel crates)
        run: cargo test -p pisci-core -p pisci-kernel -p pisci-cli --lib --bins

      - name: Build openpisci-headless
        run: cargo build -p pisci-cli --release --bin openpisci-headless

      # Linux-only, because the headless binary is the reference cross-platform
      # entry point. Running it here prevents the CLI surface (args parsing,
      # capabilities JSON, pool-mode rejection) from drifting without the
      # desktop crate's Windows-specific rebuild picking it up.
      - name: Headless integration tests (Linux only)
        if: runner.os == 'Linux'
        run: cargo test -p pisci-cli --test headless_cli

      # Opt-in end-to-end LLM smoke — only runs when the repo has
      # `OPENPISCI_TEST_API_KEY` configured as a secret. Without the
      # secret the e2e test skips itself (still exits 0), so this step
      # is safe to leave in the matrix permanently.
      - name: Headless end-to-end LLM smoke (Linux, opt-in)
        if: runner.os == 'Linux'
        env:
          OPENPISCI_TEST_API_KEY: ${{ secrets.OPENPISCI_TEST_API_KEY }}
          OPENPISCI_TEST_PROVIDER: ${{ vars.OPENPISCI_TEST_PROVIDER }}
          OPENPISCI_TEST_MODEL: ${{ vars.OPENPISCI_TEST_MODEL }}
          OPENPISCI_TEST_BASE_URL: ${{ vars.OPENPISCI_TEST_BASE_URL }}
        run: cargo test -p pisci-cli --test headless_cli -- e2e_run_returns_answer_with_real_api_key --nocapture

  # ──────────────────────────────────────────────────────────────────────────
  # Desktop host (Tauri) — cross-platform compile gate.
  # Linux / macOS only run `cargo check -p pisci-desktop --lib` (plus a clippy
  # -D warnings pass over the library target). The Windows-specific tools
  # (UIA / screen / COM / PowerShell / …) are behind `#[cfg(target_os =
  # "windows")]`, so this job fails fast if someone forgets to gate a new
  # Windows-only import. We intentionally do not run tests or build the full
  # desktop bundle here — those still live on `rust-desktop` below.
  # ──────────────────────────────────────────────────────────────────────────
  rust-desktop-cross:
    name: Rust desktop cross-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-tauri
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri 2 on Linux needs webkit2gtk + libsoup dev headers so the
      # `wry` / `tao` crates find their system dependencies. macOS pulls
      # everything from the platform SDK so no extra install is needed.
      # libpipewire-0.3-dev is required by libspa-sys (audio/PipeWire support).
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev

      - name: Cargo check (pisci-desktop lib)
        run: cargo check -p pisci-desktop --lib

      - name: Clippy (pisci-desktop lib, -D warnings)
        run: cargo clippy -p pisci-desktop --lib -- -D warnings

  # ──────────────────────────────────────────────────────────────────────────
  # Desktop host (Tauri) — Windows-only because the current host links against
  # Windows-specific tools (UIA, screen, COM, PowerShell, …).
  # ──────────────────────────────────────────────────────────────────────────
  rust-desktop:
    name: Rust desktop (clippy · test · build)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust format check
        run: cargo fmt --check

      - name: Rust lint (clippy)
        run: cargo clippy --lib -- -D warnings

      - name: Rust unit tests
        env:
          RUSTFLAGS: -C link-arg=/MANIFEST:EMBED -C link-arg=/MANIFESTINPUT:${{ github.workspace }}/.github/windows-test.manifest
        run: cargo test --lib

      - name: Rust release build
        run: cargo build --release

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: pisci-desktop-windows
          path: target/release/pisci-desktop.exe
          if-no-files-found: error
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Package: Tauri bundle — runs on push to main/master OR on version tags.
  # Matrix builds the desktop bundle on all three platforms in parallel.
  # Each runner uploads its native installer artefact; on tag pushes all
  # platform installers are attached to the same GitHub Release.
  #
  # Bundle output layout (tauri 2):
  #   Windows  target/release/bundle/nsis/*.exe
  #   macOS    target/release/bundle/dmg/*.dmg
  #            target/release/bundle/macos/*.app     (directory, not uploaded)
  #   Linux    target/release/bundle/deb/*.deb
  #            target/release/bundle/appimage/*.AppImage
  # ──────────────────────────────────────────────────────────────────────────
  package:
    name: Tauri Bundle (${{ matrix.os }})
    needs: [frontend, rust-kernel, rust-desktop-cross, rust-desktop]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    # Required for softprops/action-gh-release to upload assets on tag pushes (default GITHUB_TOKEN is read-only otherwise).
    permissions:
      contents: write
    if: >
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/tags/v')
      ))
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri 2 on Linux links against the system webkit2gtk + libsoup
      # stack; install their -dev packages before `cargo build` kicks in.
      # libpipewire-0.3-dev is required by libspa-sys (audio/PipeWire support).
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── Platform-specific artefact upload ────────────────────────────────
      # Note: `src-tauri/.cargo/config.toml` sets `target-dir = "../target"`,
      # so Tauri bundles land in `target/release/bundle/<kind>/` at repo root.
      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pisci-desktop-windows
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload macOS installer
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: pisci-desktop-macos
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Upload Linux installer
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: pisci-desktop-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 30

      # ── Attach to GitHub Release (tag-only, one step per platform) ──────
      - name: Attach Windows installer to GitHub Release
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          fail_on_unmatched_files: false

      - name: Attach macOS installer to GitHub Release
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: false

      - name: Attach Linux installer to GitHub Release
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: false
