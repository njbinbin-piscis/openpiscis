content = """
def build_markdown_table(headers: list[str], rows: list[list[str]]) -> str:
    top = "| " + " | ".join(headers) + " |"
    separator = "|" + "---|" * (len(headers) - 1)
    body = ["| " + " | ".join(row) + " |" for row in rows]
    return "\\n".join([top, separator, *body])
"""
