title = "Fix listener cleanup on disconnect"
task_timeout_secs = 300
test_timeout_secs = 60
test_command = '''{python} -m unittest discover -s tests -p "test_*.py" -q'''
prompt = """
The realtime socket wrapper leaks message listeners after disconnect.
Please find the cleanup bug, make the minimal fix, run the tests, and summarize the leak mechanism.
"""
[[tasks.seed_files]]
path = "app/__init__.py"
content = ""
[[tasks.seed_files]]
path = "app/realtime/__init__.py"
content = ""
[[tasks.seed_files]]
path = "app/realtime/registry.py"
content = """
class ListenerRegistry:
    def __init__(self):
        self._listeners = {}

    def add(self, socket_id, event_name, callback):
        self._listeners.setdefault(socket_id, {})[event_name] = callback

    def remove(self, socket_id, event_name):
        bucket = self._listeners.get(event_name, {})
        bucket.pop(socket_id, None)
"""
[[tasks.seed_files]]
path = "app/realtime/socket.py"
content = """
from app.realtime.registry import ListenerRegistry


class FakeSocket:
    def __init__(self, socket_id: str, registry: ListenerRegistry):
        self.socket_id = socket_id
        self.registry = registry

    def on_message(self, callback):
        self.registry.add(self.socket_id, "message", callback)

    def disconnect(self):
        self.registry.remove(self.socket_id, "message")
"""
[[tasks.seed_files]]
path = "tests/test_socket.py"
content = """
import unittest
from app.realtime.registry import ListenerRegistry
from app.realtime.socket import FakeSocket


class SocketTests(unittest.TestCase):
    def test_disconnect_removes_listener(self):
        registry = ListenerRegistry()
        sock = FakeSocket("sock-1", registry)
        sock.on_message(lambda payload: payload)
        sock.disconnect()
        self.assertEqual(registry._listeners.get("sock-1", {}), {})


if __name__ == "__main__":
    unittest.main()
"""

