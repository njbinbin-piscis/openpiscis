from datetime import datetime, timedelta


def next_run_after(now: datetime, hour: int, minute: int) -> datetime:
    candidate = now.replace(hour=hour, minute=minute, second=0, microsecond=0)
    if candidate < now:
        return candidate
    return candidate + timedelta(days=1)
"""
[[tasks.seed_files]]
path = "tests/test_scheduler.py"
content = """
import unittest
from datetime import datetime
from app.scheduler import next_run_after


class SchedulerTests(unittest.TestCase):
    def test_same_day_future_window_stays_same_day(self):
        now = datetime(2026, 1, 10, 23, 50)
        expected = datetime(2026, 1, 10, 23, 55)
        self.assertEqual(next_run_after(now, 23, 55), expected)

    def test_past_window_rolls_to_next_day(self):
        now = datetime(2026, 1, 10, 23, 50)
        expected = datetime(2026, 1, 11, 23, 40)
        self.assertEqual(next_run_after(now, 23, 40), expected)


if __name__ == "__main__":
    unittest.main()
"""
